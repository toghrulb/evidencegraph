name: ${COMPOSE_PROJECT_NAME:-evidencegraph}

x-backend-environment: &backend-environment
  DATABASE_URL: >-
    postgresql+psycopg://${POSTGRES_USER:-evidencegraph}:${POSTGRES_PASSWORD:-evidencegraph_local_only}@postgres:5432/${POSTGRES_DB:-evidencegraph}
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-evidencegraph}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-evidencegraph_local_only}
  S3_BUCKET: ${S3_BUCKET:-evidencegraph-papers}
  EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
  RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
  LLM_PROVIDER: ${LLM_PROVIDER:-none}
  LLM_MODEL: ${LLM_MODEL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
  DEFAULT_DENSE_TOP_K: ${DEFAULT_DENSE_TOP_K:-20}
  DEFAULT_SPARSE_TOP_K: ${DEFAULT_SPARSE_TOP_K:-20}
  DEFAULT_RERANK_TOP_K: ${DEFAULT_RERANK_TOP_K:-8}
  RRF_K: ${RRF_K:-60}

services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evidencegraph}
      POSTGRES_USER: ${POSTGRES_USER:-evidencegraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evidencegraph_local_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7.4.9-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-evidencegraph}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-evidencegraph_local_only}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-environment
    command:
      - /bin/sh
      - -c
      - >-
        alembic upgrade head &&
        exec fastapi run app/main.py --host 0.0.0.0 --port 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-environment
    command:
      - celery
      - -A
      - app.worker:celery_app
      - worker
      - --loglevel=INFO
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
